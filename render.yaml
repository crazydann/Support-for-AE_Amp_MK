services:
  - type: web
    name: ae-intelligence
    runtime: python
    buildCommand: cd frontend && npm install && npm run build && cd .. && pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: NOTES_SPREADSHEET_ID
        value: 1Wv-rFjh953ge7t7fXDhIYqhxbZ5l4NMrPpsr74pWans
      - key: SLACK_USER_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
